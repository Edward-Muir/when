name: Release

# Cut a release from anywhere (incl. the GitHub mobile app): Actions -> Release
# -> Run workflow -> pick the bump. Mirrors scripts/release.sh, but runs in CI
# with GITHUB_TOKEN so it can push the release commit + tag to main.
on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Version bump'
        type: choice
        default: auto
        options:
          - auto # detect from conventional commits
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # full history + tags for changelog / version detection

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --ignore-scripts skips husky's prepare and the sharp native build; neither
      # is needed to cut a release, and it keeps the run fast and network-robust.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Never tag a broken main.
      - name: Sanity checks
        run: |
          npm run typecheck
          npm test -- --watchAll=false
        env:
          CI: true

      - name: Bump version, changelog and tag
        run: |
          if [ "${{ inputs.release-type }}" = "auto" ]; then
            npm run release
          else
            npm run release:${{ inputs.release-type }}
          fi

      - name: Push commit and tag
        run: git push --follow-tags origin main
